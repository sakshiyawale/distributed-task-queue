<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Distributed Task Queue System — Architecture Animation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 32px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; color: #58a6ff; }
  header span { font-size: 0.8rem; color: #8b949e; }

  .scenario-bar {
    display: flex;
    gap: 10px;
    padding: 14px 32px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-wrap: wrap;
    align-items: center;
  }
  .scenario-bar label { font-size: 0.78rem; color: #8b949e; margin-right: 4px; }

  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #e6edf3;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .btn:hover { background: #30363d; border-color: #58a6ff; }
  .btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .speed-control { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .speed-control label { font-size: 0.75rem; color: #8b949e; }
  input[type=range] { width: 80px; accent-color: #58a6ff; }

  .main {
    display: flex;
    flex: 1;
    gap: 0;
  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg#arch {
    width: 100%;
    height: 100%;
    min-height: 520px;
  }

  /* ── Component boxes ── */
  .comp-box {
    rx: 10; ry: 10;
    stroke-width: 1.5;
  }

  /* ── Step panel ── */
  .step-panel {
    width: 300px;
    background: #161b22;
    border-left: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .step-panel h2 {
    padding: 14px 18px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid #30363d;
  }
  .steps-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step-item {
    display: flex;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    line-height: 1.5;
    border: 1px solid transparent;
    transition: all 0.3s;
    opacity: 0.35;
  }
  .step-item.active {
    background: #1c2128;
    border-color: #30363d;
    opacity: 1;
  }
  .step-item.done {
    opacity: 0.55;
  }
  .step-item.highlight {
    background: #1f2a3a;
    border-color: #388bfd;
    opacity: 1;
  }
  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 700;
    flex-shrink: 0;
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
  }
  .step-item.highlight .step-num { background: #1f6feb; color: #fff; border-color: #388bfd; }
  .step-item.done .step-num { background: #196c2e; color: #3fb950; border-color: #238636; }

  .step-text strong { color: #f0f6fc; display: block; margin-bottom: 2px; }
  .step-text span { color: #8b949e; font-size: 0.73rem; }

  /* progress bar */
  .progress-wrap {
    padding: 12px 18px;
    border-top: 1px solid #30363d;
  }
  .progress-bar-bg {
    height: 4px; background: #21262d; border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: #1f6feb; border-radius: 2px;
    transition: width 0.4s;
    width: 0%;
  }
  .progress-label {
    font-size: 0.72rem; color: #8b949e; margin-top: 6px;
    display: flex; justify-content: space-between;
  }

  /* ── SVG styles (inline via JS) ── */
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8L2 7h20z"/></svg>
  <h1>Distributed Task Queue System</h1>
  <span>Interactive Architecture Animation</span>
</header>

<div class="scenario-bar">
  <label>Scenario:</label>
  <button class="btn active" id="btn-submit" onclick="runScenario('submit')">Submit Task</button>
  <button class="btn" id="btn-process" onclick="runScenario('process')">Worker Processing</button>
  <button class="btn" id="btn-retry" onclick="runScenario('retry')">Retry on Failure</button>
  <button class="btn" id="btn-auth" onclick="runScenario('auth')">Auth Flow</button>
  <button class="btn" id="btn-realtime" onclick="runScenario('realtime')">Real-time Update</button>
  <button class="btn" id="btn-cancel" onclick="runScenario('cancel')">Cancel Task</button>
  <button class="btn" id="btn-replay" onclick="replayScenario()" title="Replay current scenario" style="margin-left:8px;border-color:#3fb950;color:#3fb950;">↺ Replay</button>
  <button class="btn" id="btn-stop" onclick="stopScenario()" title="Stop animation" style="border-color:#f85149;color:#f85149;">⏹ Stop</button>
  <div class="speed-control">
    <label>Speed:</label>
    <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1" />
    <span id="speedLabel" style="font-size:0.75rem;color:#8b949e;width:28px">1x</span>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap">
    <svg id="arch" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#444d56"/>
        </marker>
        <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
        </marker>
        <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
        </marker>
        <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
        </marker>
        <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
        </marker>
        <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#a371f7"/>
        </marker>
        <filter id="glow-blue">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-green">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ═══════════════ BACKGROUND LAYERS ═══════════════ -->
      <!-- Frontend zone -->
      <rect x="18" y="18" width="175" height="510" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
      <text x="105" y="38" text-anchor="middle" font-size="10" fill="#484f58" font-family="monospace">FRONTEND</text>

      <!-- Backend zone -->
      <rect x="210" y="18" width="310" height="510" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
      <text x="365" y="38" text-anchor="middle" font-size="10" fill="#484f58" font-family="monospace">SPRING BOOT BACKEND :8080</text>

      <!-- Infrastructure zone -->
      <rect x="538" y="18" width="348" height="510" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
      <text x="712" y="38" text-anchor="middle" font-size="10" fill="#484f58" font-family="monospace">INFRASTRUCTURE</text>

      <!-- ═══════════════ STATIC WIRES ═══════════════ -->
      <!-- Frontend → JWT Filter -->
      <line x1="193" y1="120" x2="228" y2="120" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- JWT Filter → TaskController -->
      <line x1="282" y1="145" x2="282" y2="185" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- TaskController → TaskService -->
      <line x1="350" y1="210" x2="400" y2="210" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- TaskService → Redis -->
      <line x1="513" y1="180" x2="556" y2="155" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- TaskService → Kafka -->
      <line x1="513" y1="220" x2="556" y2="295" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- Kafka → TaskWorker -->
      <line x1="712" y1="365" x2="712" y2="410" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- TaskWorker → Redis (update) -->
      <line x1="640" y1="435" x2="590" y2="175" stroke="#2d333b" stroke-width="1" stroke-dasharray="3,4" marker-end="url(#arrow)"/>
      <!-- WebSocket ↔ Frontend -->
      <line x1="193" y1="300" x2="282" y2="300" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3"/>
      <!-- TaskWorker → WebSocket -->
      <line x1="640" y1="440" x2="340" y2="300" stroke="#2d333b" stroke-width="1" stroke-dasharray="3,4" marker-end="url(#arrow)"/>
      <!-- AuthController → H2 -->
      <line x1="350" y1="390" x2="556" y2="455" stroke="#2d333b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

      <!-- ═══════════════ COMPONENTS ═══════════════ -->

      <!-- React Frontend -->
      <rect id="comp-frontend" x="28" y="60" width="155" height="100" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="105" y="82" text-anchor="middle" font-size="11" fill="#58a6ff" font-weight="bold" font-family="monospace">⚛ React App</text>
      <text x="105" y="98" text-anchor="middle" font-size="9" fill="#6e7681">localhost:3000</text>
      <line x1="38" y1="106" x2="173" y2="106" stroke="#21262d" stroke-width="1"/>
      <text x="105" y="119" text-anchor="middle" font-size="8.5" fill="#8b949e">TaskForm</text>
      <text x="105" y="131" text-anchor="middle" font-size="8.5" fill="#8b949e">TaskList</text>
      <text x="105" y="143" text-anchor="middle" font-size="8.5" fill="#8b949e">Dashboard</text>

      <!-- Auth Forms -->
      <rect id="comp-auth-ui" x="28" y="175" width="155" height="55" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="105" y="196" text-anchor="middle" font-size="10.5" fill="#a371f7" font-weight="bold" font-family="monospace">🔐 Auth UI</text>
      <text x="105" y="212" text-anchor="middle" font-size="8.5" fill="#8b949e">Login / Register</text>
      <text x="105" y="224" text-anchor="middle" font-size="8.5" fill="#8b949e">localStorage JWT</text>

      <!-- WebSocket Client -->
      <rect id="comp-ws-client" x="28" y="245" width="155" height="55" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>

      <text x="105" y="281" text-anchor="middle" font-size="8.5" fill="#8b949e">SockJS / STOMP</text>
      <text x="105" y="293" text-anchor="middle" font-size="8.5" fill="#8b949e">/topic/task-updates</text>

      <!-- Axios -->
      <rect id="comp-axios" x="28" y="315" width="155" height="42" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>

      <text x="105" y="347" text-anchor="middle" font-size="8.5" fill="#8b949e">JWT Interceptor</text>

      <!-- ── JWT Filter ── -->
      <rect id="comp-jwt-filter" x="222" y="95" width="120" height="60" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="282" y="115" text-anchor="middle" font-size="10.5" fill="#a371f7" font-weight="bold" font-family="monospace">🛡 JWT Filter</text>
      <text x="282" y="131" text-anchor="middle" font-size="8" fill="#8b949e">OncePerRequest</text>
      <text x="282" y="143" text-anchor="middle" font-size="8" fill="#8b949e">SecurityContext</text>

      <!-- ── Task Controller ── -->
      <rect id="comp-controller" x="222" y="180" width="120" height="65" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="282" y="200" text-anchor="middle" font-size="10.5" fill="#3fb950" font-weight="bold" font-family="monospace">🎮 Controller</text>
      <text x="282" y="215" text-anchor="middle" font-size="8" fill="#8b949e">POST /tasks</text>
      <text x="282" y="227" text-anchor="middle" font-size="8" fill="#8b949e">GET /tasks/{id}</text>
      <text x="282" y="239" text-anchor="middle" font-size="8" fill="#8b949e">cancel/pause/retry</text>

      <!-- ── WebSocket Config ── -->
      <rect id="comp-ws-server" x="222" y="270" width="120" height="55" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="282" y="290" text-anchor="middle" font-size="10.5" fill="#f0883e" font-weight="bold" font-family="monospace">⚡ WS Broker</text>
      <text x="282" y="306" text-anchor="middle" font-size="8" fill="#8b949e">STOMP /ws</text>
      <text x="282" y="318" text-anchor="middle" font-size="8" fill="#8b949e">/topic/task-updates</text>

      <!-- ── Auth Controller ── -->
      <rect id="comp-auth-ctrl" x="222" y="355" width="120" height="55" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="282" y="373" text-anchor="middle" font-size="10.5" fill="#a371f7" font-weight="bold" font-family="monospace">🔑 Auth API</text>
      <text x="282" y="389" text-anchor="middle" font-size="8" fill="#8b949e">/auth/login</text>
      <text x="282" y="401" text-anchor="middle" font-size="8" fill="#8b949e">/auth/register</text>

      <!-- ── Task Service ── -->
      <rect id="comp-taskservice" x="372" y="165" width="128" height="90" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="436" y="185" text-anchor="middle" font-size="10.5" fill="#58a6ff" font-weight="bold" font-family="monospace">⚙ TaskService</text>
      <text x="436" y="200" text-anchor="middle" font-size="8" fill="#8b949e">submitTask()</text>
      <text x="436" y="212" text-anchor="middle" font-size="8" fill="#8b949e">updateTask()</text>
      <text x="436" y="224" text-anchor="middle" font-size="8" fill="#8b949e">getTaskStatistics()</text>
      <text x="436" y="236" text-anchor="middle" font-size="8" fill="#8b949e">registerWorker()</text>
      <text x="436" y="248" text-anchor="middle" font-size="8" fill="#8b949e">cancelTask() / retryTask()</text>

      <!-- ── JWT Service ── -->
      <rect id="comp-jwtservice" x="372" y="340" width="128" height="60" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>

      <text x="436" y="388" text-anchor="middle" font-size="8" fill="#8b949e">validateToken()</text>

      <!-- ── REDIS ── -->
      <rect id="comp-redis" x="556" y="60" width="160" height="115" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>

      <text x="636" y="95" text-anchor="middle" font-size="8.5" fill="#8b949e">localhost:6379</text>
      <line x1="566" y1="103" x2="706" y2="103" stroke="#21262d" stroke-width="1"/>
      <text x="636" y="118" text-anchor="middle" font-size="8.5" fill="#e6edf3">task:{UUID} → JSON</text>
      <text x="636" y="131" text-anchor="middle" font-size="8.5" fill="#8b949e">TTL: 24 hours</text>
      <text x="636" y="144" text-anchor="middle" font-size="8.5" fill="#e6edf3">tasks:all → [ids]</text>
      <text x="636" y="157" text-anchor="middle" font-size="8.5" fill="#8b949e">worker:{id} TTL: 5min</text>
      <text x="636" y="170" text-anchor="middle" font-size="8" fill="#8b949e">Key-Value + List</text>

      <!-- ── KAFKA ── -->
      <rect id="comp-kafka" x="556" y="200" width="330" height="165" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>

      <text x="721" y="234" text-anchor="middle" font-size="8.5" fill="#8b949e">localhost:9092 | consumer-group: task-queue-workers</text>
      <line x1="566" y1="241" x2="876" y2="241" stroke="#21262d" stroke-width="1"/>

      <rect id="topic-low" x="797" y="248" width="68" height="28" rx="5" fill="#1a1f2d" stroke="#58a6ff" stroke-width="1"/>
      <text x="831" y="262" text-anchor="middle" font-size="8" fill="#58a6ff" font-weight="bold">LOW</text>
      <text x="831" y="272" text-anchor="middle" font-size="7.5" fill="#8b949e">priority 1</text>

      <!-- Retry topic -->
      <rect id="topic-retry" x="566" y="284" width="298" height="28" rx="5" fill="#2d1f2d" stroke="#a371f7" stroke-width="1"/>

      <text x="715" y="308" text-anchor="middle" font-size="7.5" fill="#8b949e">exponential backoff: 2^retryCount seconds</text>

      <!-- Kafka offset label -->
      <text x="721" y="340" text-anchor="middle" font-size="7.5" fill="#484f58">auto-offset-reset: earliest | group-id: task-queue-workers</text>
      <text x="721" y="353" text-anchor="middle" font-size="7.5" fill="#484f58">Zookeeper :2181 | @KafkaListener on 5 topics</text>

      <!-- ── TASK WORKER ── -->
      <rect id="comp-worker" x="556" y="410" width="330" height="105" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
      <text x="721" y="430" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="bold" font-family="monospace">⚡ TaskWorker</text>
      <text x="721" y="444" text-anchor="middle" font-size="8.5" fill="#8b949e">worker-{UUID} | @PostConstruct registers in Redis</text>
      <line x1="566" y1="450" x2="876" y2="450" stroke="#21262d" stroke-width="1"/>
      <text x="617" y="464" text-anchor="middle" font-size="8" fill="#8b949e">EMAIL_SEND</text>
      <text x="617" y="476" text-anchor="middle" font-size="7.5" fill="#484f58">2s delay</text>
      <text x="683" y="464" text-anchor="middle" font-size="8" fill="#8b949e">IMAGE_PROCESS</text>
      <text x="683" y="476" text-anchor="middle" font-size="7.5" fill="#484f58">5s delay</text>
      <text x="754" y="464" text-anchor="middle" font-size="8" fill="#8b949e">DATA_EXPORT</text>
      <text x="754" y="476" text-anchor="middle" font-size="7.5" fill="#484f58">3s delay</text>

// ─── Packet animation ─────────────────────────────────────────────────────────
function animatePacket(from, to, color, label, duration, onDone) {
  const svg = document.getElementById('arch');
  const g = document.getElementById('packets');

  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('r', '7');
  circle.setAttribute('fill', color);
  circle.setAttribute('opacity', '0.95');
  circle.style.filter = `drop-shadow(0 0 5px ${color})`;

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '7.5');
  text.setAttribute('fill', color);
  text.setAttribute('dy', '-11');
  text.setAttribute('font-family', 'monospace');
  text.textContent = label;

  const trail = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  trail.setAttribute('stroke', color);
  trail.setAttribute('stroke-width', '1.5');
  trail.setAttribute('opacity', '0.35');
  trail.setAttribute('x1', from[0]); trail.setAttribute('y1', from[1]);
  trail.setAttribute('x2', from[0]); trail.setAttribute('y2', from[1]);

  g.appendChild(trail);
  g.appendChild(circle);
  g.appendChild(text);

  let start = null;
  function frame(ts) {
    if (!start) start = ts;
    const progress = Math.min((ts - start) / duration, 1);
    const ease = progress < 0.5 ? 2*progress*progress : -1+(4-2*progress)*progress;
    const x = from[0] + (to[0]-from[0]) * ease;
    const y = from[1] + (to[1]-from[1]) * ease;
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    text.setAttribute('x', x);
    text.setAttribute('y', y);
    trail.setAttribute('x2', x);
    trail.setAttribute('y2', y);

    if (progress < 1) {
      const id = requestAnimationFrame(frame);
      packetAnims.push(id);
    } else {
      setTimeout(() => {
        g.removeChild(circle);
        g.removeChild(text);
        g.removeChild(trail);
      }, 300);
      if (onDone) onDone();
    }
  }
  const id = requestAnimationFrame(frame);
  packetAnims.push(id);
}

function clearPackets() {
  packetAnims.forEach(cancelAnimationFrame);
  packetAnims = [];
  document.getElementById('packets').innerHTML = '';
}

    ['topic-retry','comp-worker'],
    ['comp-worker','topic-retry'],
    ['comp-worker'],
    ['comp-worker','comp-redis'],
    ['comp-worker','comp-ws-server','comp-ws-client']
  ],
  auth: [
    ['comp-auth-ui'],
    ['comp-auth-ui','comp-axios'],
    ['comp-jwt-filter'],
    ['comp-auth-ctrl'],
    ['comp-auth-ctrl','comp-jwtservice','comp-h2'],
    ['comp-h2'],
    ['comp-jwtservice'],
    ['comp-auth-ctrl','comp-auth-ui'],
    ['comp-auth-ui'],
    ['comp-axios','comp-jwt-filter']
  ],
  cancel: [
    ['comp-frontend','comp-axios'],
    ['comp-jwt-filter'],
    ['comp-controller'],
    ['comp-taskservice','comp-redis'],
    ['comp-taskservice','comp-redis'],
    ['comp-kafka','comp-worker'],
    ['comp-worker','comp-ws-server','comp-ws-client','comp-frontend'],
    ['comp-taskservice','comp-frontend']
  ],
  realtime: [
    ['comp-ws-client','comp-ws-server'],
    ['comp-ws-server'],
    ['comp-worker'],
    ['comp-worker','comp-ws-server'],
    ['comp-ws-server','comp-ws-client'],
    ['comp-ws-client'],
    ['comp-ws-client','comp-frontend'],
    ['comp-frontend','comp-axios']
  ]
};

// ─── Run a scenario ───────────────────────────────────────────────────────────
function runScenario(name) {
  if (animTimeout) clearTimeout(animTimeout);
  clearPackets();
  resetAllComps();

  document.querySelectorAll('.btn[id^=btn-]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');

  currentScenario = name;
  currentStep = -1;
  isRunning = true;

  renderSteps();
  nextStep();
}

function renderSteps() {
  const sc = scenarios[currentScenario];
  const list = document.getElementById('stepsList');
  list.innerHTML = '';
  sc.steps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.id = 'step-' + i;
    div.innerHTML = `
      <div class="step-num">${i+1}</div>
      <div class="step-text">
        <strong>${s.title}</strong>
        <span>${s.detail.replace(/\n/g,'<br>')}</span>
      </div>`;
    list.appendChild(div);
  });
}

function nextStep() {
  const sc = scenarios[currentScenario];
  if (!sc) return;

  currentStep++;
  if (currentStep >= sc.steps.length) {
    isRunning = false;
    updateProgress();
    return;
  }

  resetAllComps();
  const step = sc.steps[currentStep];
  const highlights = (stepHighlights[currentScenario] || [])[currentStep] || [];
  highlights.forEach(id => highlightComp(id, step.color));

  // Update step list
  document.querySelectorAll('.step-item').forEach((el, i) => {
    el.classList.remove('active','done','highlight');
    if (i < currentStep) el.classList.add('done');
    else if (i === currentStep) { el.classList.add('highlight'); el.scrollIntoView({block:'nearest'}); }
  });

  updateProgress();

  // Animate packets
  const packets = step.packets || [];
  let done = 0;
  if (packets.length === 0) {
    scheduleNext(700);
  } else {
    const dur = Math.round(600 / speedMult);
    packets.forEach(p => {
      animatePacket(p.from, p.to, p.color, p.label, dur, () => {
        done++;
        if (done === packets.length) scheduleNext(400);
      });
    });
  }
}

function scheduleNext(baseDelay) {
  const delay = Math.round(baseDelay / speedMult) + Math.round(900 / speedMult);
  animTimeout = setTimeout(nextStep, delay);
}

function updateProgress() {
  const sc = scenarios[currentScenario];
  if (!sc) return;
  const total = sc.steps.length;
  const done = currentStep + 1;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    isRunning ? `Step ${done} of ${total}: ${sc.steps[Math.min(currentStep,total-1)]?.title || ''}` : 'Completed';
  document.getElementById('progressPct').textContent = pct + '%';
}

// ─── Replay ───────────────────────────────────────────────────────────────────
function replayScenario() {
  if (currentScenario) runScenario(currentScenario);
}

// ─── Stop ─────────────────────────────────────────────────────────────────────
function stopScenario() {
  if (animTimeout) { clearTimeout(animTimeout); animTimeout = null; }
  clearPackets();
  resetAllComps();
  isRunning = false;
  document.querySelectorAll('.step-item').forEach(el => el.classList.remove('highlight'));
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = 'Stopped — press Replay or pick a scenario';
  document.getElementById('progressPct').textContent = '';
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  runScenario('submit');
});
</script>
